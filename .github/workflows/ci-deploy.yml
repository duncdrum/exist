name: Deploy
on: [push, pull_request]
jobs:
  build:
    name: Build and Test Images
    runs-on: ubuntu-latest
#    if: ${{ github.ref == ('refs/heads/develop' || 'refs/heads/master' || 'refs/heads/docker-test') }}
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Set up JDK 8
        uses: actions/setup-java@v1
        with:
          java-version: '8'
      - name: Install bats
        run: sudo apt-get install bats
      - name: Cache Maven packages
        uses: actions/cache@v2
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build images
        run: mvn -V -B -q -Pdocker -DskipTests -Ddependency-check.skip=true clean package
      - name: Archive exist-docker target
        uses: actions/upload-artifact@v2
        with:
          name: docker package
          path: exist-docker/target
      - name: Start container
        run: |
          docker run -dit -p 8080:8080 --name exist-ci --rm existdb/existdb:latest
          sleep 30s
      - name: run tests
        run: bats exist-docker/src/test/bats/*.bats
  deploy:
    name: Publishing docker images
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Set up JDK 8
        uses: actions/setup-java@v1
        with:
          java-version: '8'
      - name: Download workflow run artifacts
        uses: actions/download-artifact@v2
#      - name: Push latest images
#        if: ${{ github.ref == 'refs/heads/develop' }}
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
#          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
#        run: mvn -Ddocker.tag=latest -Ddocker.username=$DOCKER_USERNAME -Ddocker.password=$DOCKER_PASSWORD docker:push
#        working-directory: ./exist-docker
#      - name: Push release images
#        if: ${{ github.ref == 'refs/heads/master' }}
#        env:
#          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
#          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
#        run: mvn -Ddocker.tag=latest -Ddocker.username=$DOCKER_USERNAME -Ddocker.password=$DOCKER_PASSWORD docker:push
#        working-directory: ./exist-docker
      - name: Push experimental images
        if: ${{ github.ref == 'refs/heads/docker-test' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: mvn -Ddocker.tag=latest -Ddocker.username=$DOCKER_USERNAME -Ddocker.password=$DOCKER_PASSWORD docker:push
        working-directory: ./exist-docker
