name: CI
on: [push, pull_request]
jobs:
  build:
    name: (${{ matrix.os }} / JDK ${{ matrix.jdk }}) Build and Test 
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        jdk: ['8', '11']        
        include:
          - os: ubuntu-latest
            jdk: '15'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v1
        with:
          java-version: ${{ matrix.jdk }}
      - name: Cache Maven packages
        uses: actions/cache@v2
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Maven Build
        run: mvn -V -B -q -DskipTests=true "-Dmaven.javadoc.skip=true" install
      - name: Maven Test
        run: mvn -V -B verify -Ptests
      - name: Maven Javadoc
        run: mvn -V -B -q javadoc:javadoc
  deploy:
      runs-on: ubuntu-latest
      needs: build    
      steps:
        - uses: actions/checkout@v2
          with:
            fetch-depth: 0
        - name: Set up JDK 8
          uses: actions/setup-java@v1
          with:
            java-version: '8'
        # TODO: reuse artiefacts from Build step
        - name: Maven Build
          run: mvn -V -T2C clean package -DskipTests -Ddependency-check.skip=true -Ddocker=true    
        - name: Build and push latest images
          if: github.ref == 'refs/heads/develop'
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
            DOCKER_PASSWORD: $ {{ secrets.DOCKER_PASSWORD }}
          run: |
            cd exist-docker
            mvn -DskipTests -Ddocker.tag=latest -Ddocker.username=$DOCKER_USERNAME -Ddocker.password=$DOCKER_PASSWORD docker:build docker:push
            cd ..
        - name: Build and push release images
          if: github.ref == 'refs/heads/master'
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
            DOCKER_PASSWORD: $ {{ secrets.DOCKER_PASSWORD }}
          run: |
            cd exist-docker
            mvn -DskipTests -Ddocker.tag=release -Ddocker.username=$DOCKER_USERNAME -Ddocker.password=$DOCKER_PASSWORD docker:build docker:push
            cd ..        
